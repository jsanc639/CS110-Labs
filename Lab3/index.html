<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Tic Tac Toe Game</title>
    
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
  </head>
  <body>

    <h1>Tic Tac Toe</h1>
    <h2>Its your turn, <span class="display_player"></span>.</h2>
    <div class="score_board" style="text-align: center; font-size: 1.2em; margin-bottom: 10px;">
      <p>Points X: <span id="val_puntosX">0</span> | Points O: <span id="val_puntosO">0</span></p>
    </div>
    <div class="mode_buttons" style="text-align: center; margin-bottom: 20px;">
      <button class="btn_amigo">Play with a friend</button>
      <button class="btn_ia">Play against the IA</button>
    </div>

    <div class="game_board">
      <div class='row'>
        <div class="one"><span class="xo"></span></div>
        <div class="two"><span class="xo"></span></div>
        <div class="three"><span class="xo"></span></div>
      </div>
      <div class='row'>
        <div class="four"><span class="xo"></span></div>
        <div class="five"><span class="xo"></span></div>
        <div class="six"><span class="xo"></span></div>
      </div>
      <div class='row'>
        <div class="seven"><span class="xo"></span></div>
        <div class="eight"><span class="xo"></span></div>
        <div class="nine"><span class="xo"></span></div>
      </div>
    </div>

    <button class="new_game">New Game</button>
    <button class="reset">Reset</button>
  </body>


</html>
